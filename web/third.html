<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS | Admin Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-espresso: #1a120b;
            --mocha: #3d2b1f;
            --beige-paper: #f2ede4;
            --gold: #c29c61;
            --text-dark: #2c1e14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--dark-espresso);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Instrument Sans', sans-serif;
            overflow: hidden;
        }

        /* The Main Container (Matches your Book Pages) */
        .admin-box {
            width: 800px;
            background: var(--beige-paper);
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Header Section */
        .header {
            background: var(--mocha);
            color: var(--beige-paper);
            padding: 30px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Menu Grid */
        .menu-content {
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Action Buttons */
        .menu-btn {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            background: white;
            color: var(--mocha);
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: var(--gold);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(194, 156, 97, 0.3);
        }

        /* Footer Actions */
        .footer-actions {
            padding: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: rgba(0,0,0,0.02);
        }

        .action-btn {
            padding: 12px 30px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-fine { background: #b04b4b; color: white; }
        .btn-exit { background: var(--mocha); color: white; }

        .btn-fine:hover, .btn-exit:hover { opacity: 0.8; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="admin-box">
        <div class="header">
            <h1>Admin Menu</h1>
        </div>

        <div class="menu-content">
            <a href="fourth.jsp" class="menu-btn">INSERT BOOK</a>
            <a href="five.jsp" class="menu-btn">ISSUED BOOK</a>
            <a href="six.jsp" class="menu-btn">RETURN BOOK</a>
            <a href="seven.jsp" class="menu-btn">DISPLAY ALL BOOKS</a>
            <a href="eight.jsp" class="menu-btn">DISPLAY ALL ISSUED BOOKS</a>
        </div>

        <div class="footer-actions">
            <button class="action-btn btn-fine">CALCULATE FINE</button>
            <button class="action-btn btn-exit" onclick="location.href='index.html'">EXIT SYSTEM</button>
        </div>
    </div>

</body>
</html>
